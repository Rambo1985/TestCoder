[tool:pytest]
testpaths = tests/
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v 
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html
markers =
    slow: marks tests as slow
    serial: marks tests that need to run in serial
asyncio_mode = auto